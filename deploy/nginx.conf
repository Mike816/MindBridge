# /etc/nginx/sites-available/mindbridge
#
# HIPAA-compliant nginx reverse proxy configuration.
# - TLS 1.2+ (1.3 preferred) for data-in-transit encryption
# - Proxies frontend (Vite build) and API (Node.js backend)
# - Security headers

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # ── TLS (managed by certbot, or set manually) ──
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # ── Strong TLS settings ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Frontend: serve Vite build ──
    root /opt/mindbridge/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API: proxy to Node.js backend ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for Ollama (LLM can take time)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # No buffering for faster response
        proxy_buffering off;
    }

    # ── Block access to session data files ──
    location /data/ {
        deny all;
        return 404;
    }
}
